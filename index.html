  :root{
    --green:#3B6D11; --green-d:#173404; --green-soft:#EAF3DE;
    --ink:#15231b; --muted:#5d6c62; --faint:#8a978d;
    --line:#e6eae6; --bg:#f6f8f5; --card:#ffffff;

  *{box-sizing:border-box}
  body{margin:0;font-family:'Onest',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}

  button:hover{border-color:#cfd8cf}
  button.primary{background:var(--green);border-color:var(--green);color:#fff}
  button.primary:hover{background:#2f5a0d}
  button.ghost{background:transparent;border:none;color:var(--muted);padding:6px}

  .wrap{max-width:960px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .pad{padding:18px 18px}
  .row{display:flex;gap:12px;align-items:center}
  .between{justify-content:space-between}
  .wrap-fields{display:flex;flex-wrap:wrap;gap:10px}
  .field{flex:1;min-width:120px}
  .field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .small{font-size:12px} .tiny{font-size:11px}
  .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .pill{font-size:11px;background:#f0f3ef;color:var(--muted);padding:3px 10px;border-radius:99px;display:inline-block}
  .pill.warn{background:#fdf0db;color:#7a4d05}
  .pill.ok{background:var(--green-soft);color:var(--green-d)}
  .brandbar{display:flex;align-items:center;gap:11px}

  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
  .tile{border:1px solid var(--line);border-left:5px solid var(--green);border-radius:var(--radius);padding:16px;background:linear-gradient(180deg,#fff,#f8faf7);transition:.15s;cursor:pointer}

  .recent-test{padding:8px 0;border-bottom:1px solid var(--line)}

  .recent-grid{display:grid;grid-template-columns:118px 92px 80px minmax(120px,1fr) 64px 90px 64px auto;gap:0;align-items:center;background:#fbfcfa;border:1px solid var(--line);border-left:4px solid var(--green);border-radius:10px;padding:8px 10px}

  .recent-field .label{font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
  .recent-field .value{font-size:12px;font-weight:600;color:var(--ink);line-height:1.22}

  .num{font-family:'Bricolage Grotesque';font-weight:700}

  .topnav{position:sticky;top:0;z-index:5;background:rgba(246,248,245,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}

</style>

const normalizeText = s => (s||'').trim().replace(/\s+/g,' ');
const chapterKey = (cls,subject,title) => [cls, subject, normalizeText(title).toLowerCase()].join('|');
function attachChapter(t){
  const ch = t.chapter || demo.chapters?.find(c=>c.id===t.chapter_id);
  return ch ? {...t, chapter:ch, chapter_no:ch.chapter_no, chapter_name:ch.title} : t;
}

const memoryDB = {
  async listStudents(){ return [...demo.students].sort((a,b)=>a.name.localeCompare(b.name)); },
  async addStudent(s){ const r={id:uid(),...s}; demo.students.push(r); return r; },
  async updateStudent(id,patch){ Object.assign(demo.students.find(x=>x.id===id),patch); },
  async deleteStudent(id){ demo.students = demo.students.filter(x=>x.id!==id); demo.results = demo.results.filter(r=>r.student_id!==id); },
  async listChapters(cls,subject){ return demo.chapters.filter(c=>String(c.class_level)===String(cls) && c.subject===subject).sort((a,b)=>a.chapter_no-b.chapter_no); },
  async addChapter(ch){
    const title = normalizeText(ch.title);
    const existing = demo.chapters.find(c=>
      String(c.class_level)===String(ch.class_level) &&
      c.subject===ch.subject &&
      (Number(c.chapter_no)===Number(ch.chapter_no) || chapterKey(c.class_level,c.subject,c.title)===chapterKey(ch.class_level,ch.subject,title))
    );
    if(existing) return existing;
    const r={id:uid(),...ch,title}; demo.chapters.push(r); return r;
  },
  async listTests(){ return [...demo.tests].map(attachChapter).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date)); },
  async addTest(t){ const r=attachChapter({id:uid(),...t}); demo.tests.push(r); return r; },
  async updateTest(id,patch){ const t=demo.tests.find(x=>x.id===id); Object.assign(t,patch); return attachChapter(t); },
  async listResults(testId){ return demo.results.filter(r=>r.test_id===testId); },
  async allResults(){ return demo.results; },
  async saveResults(testId,rows){ demo.results=demo.results.filter(r=>r.test_id!==testId); rows.forEach(r=>demo.results.push({id:uid(),test_id:testId,...r})); },
  async addEditLogs(rows){ demo.edit_logs = demo.edit_logs || []; rows.forEach(r=>demo.edit_logs.push({id:uid(),...r})); },
};

const missingAcademicSession = error => String(error?.message||'').toLowerCase().includes('academic_session');
const withDefaultSession = rows => (rows||[]).map(s=>({...s,academic_session:s.academic_session||currentSession()}));
const stripSession = obj => {
  const copy = {...obj};
  delete copy.academic_session;
  return copy;
};
const supaDB = {
  async listStudents(){
    const res = await supa.from('students').select(STUDENT_COLS).order('name');
    if(res.error && missingAcademicSession(res.error)){
      const legacy = await supa.from('students').select(STUDENT_COLS_LEGACY).order('name');
      return withDefaultSession(legacy.data);
    }
    return withDefaultSession(res.data);
  },
  async addStudent(s){
    const payload = {...s, centre_id:CENTRE_ID};
    let res = await supa.from('students').insert(payload).select(STUDENT_COLS).single();
    if(res.error && missingAcademicSession(res.error)){
      res = await supa.from('students').insert(stripSession(payload)).select(STUDENT_COLS_LEGACY).single();
      return res.data ? {...res.data,academic_session:s.academic_session||currentSession()} : null;
    }
    return res.data;
  },
  async updateStudent(id,patch){
    let res = await supa.from('students').update(patch).eq('id',id);
    if(res.error && missingAcademicSession(res.error)){
      res = await supa.from('students').update(stripSession(patch)).eq('id',id);
    }
    if(res.error) throw res.error;
  },
  async deleteStudent(id){ await supa.from('students').delete().eq('id',id); },
  async listChapters(cls,subject){ const {data}=await supa.from('chapters').select(CHAPTER_COLS).eq('class_level',cls).eq('subject',subject).order('chapter_no'); return data||[]; },
  async addChapter(ch){
    const title = normalizeText(ch.title);
    const existing = (await this.listChapters(ch.class_level,ch.subject)).find(c=>Number(c.chapter_no)===Number(ch.chapter_no) || normalizeText(c.title).toLowerCase()===title.toLowerCase());
    if(existing) return existing;
    const {data,error}=await supa.from('chapters').insert({...ch,title,centre_id:CENTRE_ID}).select(CHAPTER_COLS).single();
    if(error && String(error.message||'').toLowerCase().includes('duplicate')){
      return (await this.listChapters(ch.class_level,ch.subject)).find(c=>Number(c.chapter_no)===Number(ch.chapter_no) || normalizeText(c.title).toLowerCase()===title.toLowerCase());
    }
    if(error) throw error;
    return data;
  },
  async listTests(){ const {data}=await supa.from('tests').select(TEST_COLS).order('test_date',{ascending:false}); return (data||[]).map(t=>t.chapter?{...t,chapter_no:t.chapter.chapter_no,chapter_name:t.chapter.title}:t); },
  async addTest(t){ const {data}=await supa.from('tests').insert({...t, centre_id:CENTRE_ID}).select(TEST_COLS).single(); return data?.chapter?{...data,chapter_no:data.chapter.chapter_no,chapter_name:data.chapter.title}:data; },
  async updateTest(id,patch){ const {data}=await supa.from('tests').update(patch).eq('id',id).select(TEST_COLS).single(); return data?.chapter?{...data,chapter_no:data.chapter.chapter_no,chapter_name:data.chapter.title}:data; },
  async listResults(testId){ const {data}=await supa.from('results').select(RESULT_COLS).eq('test_id',testId); return data||[]; },
  async allResults(){ const {data}=await supa.from('results').select(RESULT_COLS); return data||[]; },
  async saveResults(testId,rows){ await supa.from('results').delete().eq('test_id',testId); await supa.from('results').insert(rows.map(r=>({test_id:testId,...r}))); },
  async addEditLogs(rows){ if(rows.length) await supa.from('test_result_edits').insert(rows.map(r=>({...r,centre_id:CENTRE_ID}))).select(EDIT_LOG_COLS); },
};

function downloadBlob(filename,type,content){
  const blob = new Blob([content],{type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function parseCSV(text){
  const rows=[]; let row=[], cell='', q=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(q){
      if(ch==='"' && next==='"'){ cell+='"'; i++; }
      else if(ch==='"') q=false;
      else cell+=ch;
    }else if(ch==='"') q=true;
    else if(ch===','){ row.push(cell); cell=''; }
    else if(ch==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
    else if(ch==='\r'){}
    else cell+=ch;
  }
  row.push(cell); rows.push(row);
  return rows.filter(r=>r.some(c=>normalizeText(c)));
}
async function readCSVFile(file){
  const text = await file.text();
  const rows = parseCSV(text);
  if(rows.length<2) throw new Error('CSV must include a header row and at least one data row.');
  const headers = rows[0].map(csvKey);
  return rows.slice(1).map(r=>Object.fromEntries(headers.map((h,i)=>[h,normalizeText(r[i])]))).filter(o=>Object.values(o).some(Boolean));
}
const resultValue = r => r?.na ? 'N.A.' : r?.present===false ? 'Absent' : r?.marks??'';
function changedResultLogs(test, oldRows, newRows){
  const oldByStudent = new Map(oldRows.map(r=>[r.student_id,r]));
  const editedAt = new Date().toISOString();
  return newRows.map(n=>{
    const o = oldByStudent.get(n.student_id) || {};
    const changed = (o.marks??null)!==(n.marks??null) || !!o.present!==!!n.present || !!o.na!==!!n.na;
    return changed ? {
      test_id:test.id,
      student_id:n.student_id,
      edited_by:CURRENT_USER_ID,
      edited_at:editedAt,
      old_marks:o.marks??null,
      new_marks:n.marks??null,
      old_present:!!o.present,
      new_present:!!n.present,
      old_na:!!o.na,
      new_na:!!n.na
    } : null;
  }).filter(Boolean);
}
async function teacherReportData(testId){
  const test = (await DB.listTests()).find(t=>t.id===testId);
  if(!test) return null;
  const rs = await cachedResults(test.id);
  const students = await DB.listStudents();
  const rows = rs.map(r=>{
    const s = students.find(x=>x.id===r.student_id)||{};
    const p = (!r.na&&r.present&&r.marks!=null) ? pct(r.marks,test.full_marks) : null;
    return {student_id:r.student_id,name:s.name||'Student',marks:r.marks,present:!!r.present,na:!!r.na,p,grade:p==null?'':band(p),support:p!=null&&needsSupport(p)};
  });
  const ranked = rows.filter(r=>!r.na&&r.present&&r.p!=null).sort((a,b)=>b.p-a.p);
  const avg = ranked.length?Math.round(ranked.reduce((a,r)=>a+r.p,0)/ranked.length*10)/10:null;
  return {test,rows,ranked,avg,enrolled:rows.length,appeared:rows.filter(r=>!r.na&&r.present).length,absent:rows.filter(r=>!r.na&&!r.present).length,na:rows.filter(r=>r.na).length};
}
function pdfEscape(s){ return String(s??'').replace(/[^\x20-\x7E]/g,'?').replace(/\\/g,'\\\\').replace(/\(/g,'\\(').replace(/\)/g,'\\)'); }
function simplePdf(lines){
  const objects = [];
  const add = s => { objects.push(s); return objects.length; };
  const content = lines.map(l=>`BT /F1 ${l.size||10} Tf ${l.x||40} ${l.y} Td (${pdfEscape(l.text)}) Tj ET`).join('\n');
  const contentId = add(`<< /Length ${content.length} >>\nstream\n${content}\nendstream`);
  const fontId = add(`<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>`);
  const pageId = add(`<< /Type /Page /Parent 4 0 R /MediaBox [0 0 595 842] /Resources << /Font << /F1 ${fontId} 0 R >> >> /Contents ${contentId} 0 R >>`);
  const pagesId = add(`<< /Type /Pages /Kids [${pageId} 0 R] /Count 1 >>`);
  const catalogId = add(`<< /Type /Catalog /Pages ${pagesId} 0 R >>`);
  let pdf='%PDF-1.4\n', offsets=[0];
  objects.forEach((o,i)=>{ offsets[i+1]=pdf.length; pdf+=`${i+1} 0 obj\n${o}\nendobj\n`; });
  const xref=pdf.length;
  pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
  offsets.slice(1).forEach(o=>{ pdf+=String(o).padStart(10,'0')+' 00000 n \n'; });
  pdf+=`trailer << /Size ${objects.length+1} /Root ${catalogId} 0 R >>\nstartxref\n${xref}\n%%EOF`;
  return pdf;
}

function normalizeOptional(v){
  const text = normalizeText(v);
  if(!text || ['na','n/a','n.a','n.a.','none','-'].includes(text.toLowerCase())) return 'N.A.';
  return OPTIONAL.find(o=>o.toLowerCase()===text.toLowerCase()) || text;
}

const val = id => document.getElementById(id).value;
const cleanPhone = p => (p||'').replace(/[^\d]/g,'');
function normalizeIndianPhone(phone){
  let d = cleanPhone(phone);
  if(d.length===12 && d.startsWith('91')) d = d.slice(2);
  return d.length===10 && /^[6-9]\d{9}$/.test(d) ? d : null;
}
const sectionKey = s => s || 'All';
function sameClassSectionName(a,b){
  return normalizeText(a.name).toLowerCase()===normalizeText(b.name).toLowerCase() &&
    (a.academic_session||currentSession())===(b.academic_session||currentSession()) &&
    String(a.class_level)===String(b.class_level) &&
    sectionKey(a.section)===sectionKey(b.section);
}
async function warnStudentDuplicates(student, ignoreId){
  const students = await DB.listStudents();
  const duplicateName = students.find(s=>s.id!==ignoreId && sameClassSectionName(s,student));
  if(duplicateName && !confirm(`${student.name} already exists in Session ${student.academic_session}, Class ${student.class_level}, Section ${sectionKey(student.section)}. Save anyway?`)) return false;
  const phone = normalizeIndianPhone(student.parent_phone);
  if(phone){
    const duplicatePhone = students.find(s=>s.id!==ignoreId && normalizeIndianPhone(s.parent_phone)===phone);
    if(duplicatePhone && !confirm(`This parent phone is already used for ${duplicatePhone.name}. Save anyway?`)) return false;
  }
  return true;
}
const chapterLabel = t => (t.chapter_name && t.chapter_name.trim()) ? t.chapter_name : ('Chapter '+(t.chapter_no||''));
function chapterDetail(t){
  const name = (t.chapter_name||'').trim();
  const no = String(t.chapter_no||'').trim();
  if(!name) return 'Chapter '+no;
  const compact = name.toLowerCase().replace(/[\s-]/g,'');
  if(no && (compact===('ch'+no) || compact===('chapter'+no))) return 'Chapter '+no;
  return `Chapter ${no} — ${name}`;
}
const chapterOptionLabel = c => chapterDetail({chapter_no:c.chapter_no, chapter_name:c.title});
const testOptionLabel = t => `Class ${t.class_level} · Section ${t.section||'All'} · ${t.subject} · ${chapterDetail(t)} · ${fmtDate(testDate(t))}`;
const bandConfig = () => (CONFIG.BANDS||[]).slice().sort((a,b)=>b.min-a.min);
const band = p => {
  const bands = bandConfig();
  return (bands.find(b=>p>=b.min && p<=b.max) || bands[bands.length-1] || {grade:'D'}).grade;
};
const bandMeta = p => bandConfig().find(b=>b.grade===band(p)) || {grade:'D',min:0,max:39,label:'Needs Support'};
const supportBand = () => bandConfig().slice().sort((a,b)=>a.min-b.min)[0] || {grade:'D',min:0,max:39,label:'Needs Support'};
const needsSupport = p => band(p)===supportBand().grade;
const bandRangeLabel = b => b.max>=100 ? `${b.min}–100` : b.min<=0 ? `<${b.max+1}` : `${b.min}–${b.max}`;
function perfBand(p){
  const meta = bandMeta(p);
  if(meta.grade==='A') return {label:meta.label, emoji:'🌟', line:n=>`Great effort by ${n}. Keep it up!`};
  if(meta.grade==='B') return {label:meta.label, emoji:'👏', line:n=>`Well done, ${n}. Strong work!`};
  if(meta.grade==='C') return {label:meta.label, emoji:'👍', line:n=>`Good going, ${n}. A little more will go far.`};
  return {label:meta.label, emoji:'🤝', line:n=>`Let's work together to help ${n} improve.`};
}

/* ---------- helpers ---------- */
const pct = (marks, full) => (marks==null||full==0) ? null : Math.round((marks/full)*1000)/10;
const bandColor = b => ({A:'var(--teal)',B:'#639922',C:'var(--amber)',D:'var(--red)'})[b] || 'var(--muted)';
function fmtDate(d){
  if(!d) return 'No date';
  const date = new Date(d);
  if(Number.isNaN(date.getTime())) return String(d);
  return date.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
const testDate = t => t?.test_date || t?.date || t?.created_at || '';

async function classAverage(test){
  const rs = (await cachedResults(test.id)).filter(r=>!r.na && r.present && r.marks!=null);
  if(!rs.length) return null;
  return Math.round(rs.reduce((a,r)=>a+pct(r.marks,test.full_marks),0)/rs.length*10)/10;
}

window.importStudentsCSV = async file=>{
  if(!file) return;
  try{
    const rows = await readCSVFile(file);
    const existing = await DB.listStudents();
    const existingNameKeys = new Set(existing.map(s=>[
      (s.academic_session||currentSession()),
      s.class_level,
      sectionKey(s.section),
      normalizeText(s.name).toLowerCase()
    ].join('|')));
    const existingPhones = new Set(existing.map(s=>normalizeIndianPhone(s.parent_phone)).filter(Boolean));
    const students = [];
    const warnings = [];
    rows.forEach((r,i)=>{
      const rowNo = i+2;
      const name = r.student_name || r.name;
      const cls = parseInt(r.class || r.class_level || r.class_level_no);
      const sectionRaw = normalizeText(r.section || 'All');
      const section = ['A','B'].includes(sectionRaw.toUpperCase()) ? sectionRaw.toUpperCase() : null;
      const gender = normalizeText(r.gender).toLowerCase();
      const rawPhone = r.parent_phone || r.phone || r.mobile || '';
      const phone = rawPhone ? normalizeIndianPhone(rawPhone) : '';
      const academic_session = r.academic_session || r.session || currentSession();
      if(!name || !cls || !CLASSES.includes(cls) || !['male','female'].includes(gender)){
        warnings.push(`Row ${rowNo}: missing/invalid name, class, or gender.`);
        return;
      }
      if(rawPhone && !phone){
        warnings.push(`Row ${rowNo}: invalid parent phone for ${name}.`);
        return;
      }
      const key = [academic_session,cls,sectionKey(section),normalizeText(name).toLowerCase()].join('|');
      if(existingNameKeys.has(key)) warnings.push(`Row ${rowNo}: duplicate name in same session/class/section (${name}).`);
      if(phone && existingPhones.has(phone)) warnings.push(`Row ${rowNo}: parent phone already used (${name}).`);
      existingNameKeys.add(key);
      if(phone) existingPhones.add(phone);
      students.push({name:normalizeText(name),academic_session,class_level:cls,section,gender,optional_subject:normalizeOptional(r.optional_subject),parent_name:'',parent_phone:phone});
    });
    if(!students.length){ alert(`No students imported.\n${warnings.join('\n')}`); return; }
    const msg = [`Import ${students.length} student${students.length===1?'':'s'}?`].concat(warnings.slice(0,8));
    if(warnings.length>8) msg.push(`+ ${warnings.length-8} more warning(s).`);
    if(!confirm(msg.join('\n'))) return;
    for(const s of students) await DB.addStudent(s);
    alert(`Imported ${students.length} student${students.length===1?'':'s'}.`);
    SHOW_ADD=false; roster();
  }catch(e){
    alert(e.message || 'Could not read this CSV file.');
  }
};

window.importMarksCSV = async file=>{
  if(!file) return;
  try{
    const rows = await readCSVFile(file);
    const all = await DB.listStudents();
    const classStudents = EM.classStudents?.length ? EM.classStudents : all.filter(s=>s.class_level===parseInt(val('emClass')) && (s.academic_session||currentSession())===val('emSession'));
    const byId = new Map(classStudents.map(s=>[String(s.id),s]));
    const byName = new Map(classStudents.map(s=>[normalizeText(s.name).toLowerCase(),s]));
    let changed = 0;
    const warnings = [];
    rows.forEach((r,i)=>{
      const rowNo = i+2;
      const id = r.student_id || r.id;
      const name = r.student_name || r.name;
      const student = (id && byId.get(String(id))) || (name && byName.get(normalizeText(name).toLowerCase()));
      if(!student){ warnings.push(`Row ${rowNo}: student not found (${name||id||'blank'}).`); return; }
      let row = EM.rows.find(x=>x.student_id===student.id);
      if(!row){
        row = {student_id:student.id,name:student.name,gender:student.gender,marks:null,present:true,na:false};
        EM.rows.push(row);
      }
      const status = normalizeText(r.status || r.attendance || '').toLowerCase();
      const markText = normalizeText(r.marks || r.mark || r.score);
      if(['na','n/a','n.a.','n.a'].includes(status) || ['na','n/a','n.a.','n.a'].includes(markText.toLowerCase())){
        row.na = true; row.present = true; row.marks = null; changed++; return;
      }
      if(['absent','abs','a'].includes(status) || ['absent','abs','a'].includes(markText.toLowerCase())){
        row.na = false; row.present = false; row.marks = null; changed++; return;
      }
      const marks = markText==='' ? null : parseFloat(markText);
      if(markText!=='' && (Number.isNaN(marks) || marks<0 || marks>EM.full)){
        warnings.push(`Row ${rowNo}: invalid marks for ${student.name}.`);
        return;
      }
      row.na = false;
      row.present = true;
      row.marks = marks;
      changed++;
    });
    renderEMRoster(); saveDraft();
    alert(`Updated ${changed} mark row${changed===1?'':'s'}.${warnings.length?'\n\n'+warnings.slice(0,8).join('\n'):''}${warnings.length>8?`\n+ ${warnings.length-8} more warning(s).`:''}`);
  }catch(e){
    alert(e.message || 'Could not read this CSV file.');
  }
};

window.setMark = (i,v)=>{ let n=parseFloat(v); if(isNaN(n)){EM.rows[i].marks=null;} else {n=Math.max(0,Math.min(EM.full,n)); EM.rows[i].marks=n;} recountEM(); saveDraft(); };
window.toggleAbsent = i=>{ if(EM.rows[i].na) return; EM.rows[i].present=!EM.rows[i].present; if(!EM.rows[i].present)EM.rows[i].marks=null; renderEMRoster(); saveDraft(); };
window.toggleNA = i=>{ EM.rows[i].na=!EM.rows[i].na; if(EM.rows[i].na){ EM.rows[i].marks=null; EM.rows[i].present=true; } renderEMRoster(); saveDraft(); };
function recountEM(){
  const eligible = EM.rows.filter(r=>!r.na);
  let entered=0,abs=0,naC=EM.rows.length-eligible.length,sum=0,c=0;
  eligible.forEach(r=>{ if(!r.present){abs++;return;} if(r.marks!=null){entered++;sum+=pct(r.marks,EM.full);c++;} });
  const set=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  set('cEntered',entered); set('cTotal',eligible.length); set('cAbs',abs); set('cNA',naC);
  set('cAvg', c?(Math.round(sum/c*10)/10)+'%':'—');
}
window.saveTest = async ()=>{
  const eligible = EM.rows.filter(r=>!r.na);
  if(!eligible.length){ alert('No students to record (everyone is marked N.A.).'); return; }
  const blank = eligible.find(r=>r.present && r.marks==null);
  if(blank){ if(!confirm(blank.name+' has no marks. Save anyway? (Cancel to go back and mark absent or N.A.)')) return; }
  const clsNum = parseInt(val('emClass'));
  const chapterId = val('emChap');
  if(!chapterId || chapterId==='__new__'){ alert('Select a chapter, or add the new chapter first.'); return; }
  const chapter = (EM.chapters||[]).find(c=>c.id===chapterId) || (await DB.listChapters(clsNum,val('emSub'))).find(c=>c.id===chapterId);
  if(!chapter){ alert('Chapter not found. Please select the chapter again.'); return; }
  const secVal = val('emSec');
  const testData = {
    class_level: clsNum, section: secVal==='All'?null:secVal,
    subject: val('emSub'),
    chapter_id: chapter.id,
    chapter_no: chapter.chapter_no,
    chapter_name: chapter.title,
    test_type:'CET', full_marks:EM.full, test_date:document.getElementById('emDate').value
  };
  const resultRows = EM.rows.map(r=>({student_id:r.student_id,marks:(r.present&&!r.na)?r.marks:null,present:r.na?false:r.present,na:!!r.na}));
  const oldRows = EM.editId ? await cachedResults(EM.editId) : [];
  const pendingLogs = EM.editId ? changedResultLogs({id:EM.editId}, oldRows, resultRows) : [];
  if(EM.editId){
    const msg = pendingLogs.length
      ? `Overwrite this saved test and record ${pendingLogs.length} mark/attendance change${pendingLogs.length===1?'':'s'}?`
      : 'Overwrite this saved test? No mark changes were detected, but test details may be updated.';
    if(!confirm(msg)) return;
  }
  saveDraft();
  updateSaveState('saving','Saving marks...');
  let test = null;
  try{
    test = EM.editId ? await DB.updateTest(EM.editId,testData) : await DB.addTest(testData);
    EM.editId = test.id;
    EM.editTest = test;
    EM.saveLabel = '✓ Save changes';
    saveDraft();
    await DB.saveResults(test.id, resultRows);
    if(pendingLogs.length) await DB.addEditLogs(pendingLogs.map(l=>({...l,test_id:test.id})));
    invalidateResults(test.id);
    writeJSON(LS_LAST_ENTRY,{academic_session:val('emSession'),class_level:clsNum,section:secVal,subject:val('emSub')});
    clearJSON(LS_MARK_DRAFT);
    CURRENT_TEST = test.id;
    const avg = await classAverage(test);
    const entered = EM.rows.filter(r=>!r.na&&r.present&&r.marks!=null).length;
    const abs = EM.rows.filter(r=>!r.na&&!r.present).length;
    const naC = EM.rows.filter(r=>r.na).length;
    updateSaveState('saved','Saved.');
    document.getElementById('saveSummary').innerHTML =
      `Class ${test.class_level}${test.section?(' '+test.section):' (all sections)'} · ${test.subject} · ${chapterLabel(test)}<br>${test.full_marks} marks · ${fmtDate(testDate(test))}<br><br><b>${entered}</b> appeared of <b>${EM.rows.length}</b> enrolled · <b>${abs}</b> absent · <b>${naC}</b> N.A. · class avg <b>${avg??'—'}%</b>`;
    document.getElementById('saveOverlay').classList.add('show');
  }catch(e){
    updateSaveState('failed','Save failed. Your marks are still here. Check connection and retry.');
    alert('Save failed. Your entered marks were kept as a local draft. Please check the connection and click Retry save.');
  }
};

window.exportTeacherCSV = async testId=>{
  const data = await teacherReportData(testId);
  if(!data){ alert('No report data found.'); return; }
  const {test,rows,avg,enrolled,appeared,absent,na} = data;
  const header = ['Rank','Student','Status','Marks','Full marks','Percent','Band','Needs support'];
  const rankedIds = new Map(data.ranked.map((r,i)=>[r.student_id,i+1]));
  const lines = [
    ['Teacher / Class Report'],
    [`Class ${test.class_level}`,`Section ${test.section||'All'}`,test.subject,chapterDetail(test),fmtDate(testDate(test))],
    [`Appeared ${appeared} of ${enrolled}`,`Absent ${absent}`,`N.A. ${na}`,`Class average ${avg??'—'}%`],
    [],
    header
  ];
  rows.forEach(r=>{
    const status = r.na ? 'N.A.' : r.present ? 'Appeared' : 'Absent';
    lines.push([rankedIds.get(r.student_id)||'',r.name,status,resultValue(r),test.full_marks,r.p==null?'':r.p+'%',r.grade,r.support?'Yes':'No']);
  });
  const csv = lines.map(row=>row.map(csvCell).join(',')).join('\n');
  downloadBlob(`${fileSafe(test.subject+'-'+chapterDetail(test))}-teacher-report.csv`,'text/csv;charset=utf-8',csv);
};

/* ---------- GROWTH ---------- */
let GR = { mode:'class', student:null, cls:'', section:'All', subject:'' };
async function growth(){
  setCrumb('Growth tracker');
  const allTests = await DB.listTests();
  const students = await DB.listStudents();
  if((!GR.cls || !GR.subject) && allTests[0]){
    GR.cls = String(allTests[0].class_level||'');
    GR.section = allTests[0].section || 'All';
    GR.subject = allTests[0].subject || SUBJECTS[0];
  }
  if(!GR.cls) GR.cls = '1';
  if(!GR.section) GR.section = 'All';
  if(!GR.subject) GR.subject = SUBJECTS[0];
  const classStudents = students.filter(s=>String(s.class_level)===String(GR.cls));
  if(!classStudents.some(s=>s.id===GR.student)) GR.student = classStudents[0] ? classStudents[0].id : null;
  const tests = allTests
    .filter(t=>String(t.class_level)===String(GR.cls) && (t.section||'All')===GR.section && t.subject===GR.subject)
    .sort((a,b)=>(Number(a.chapter_no)||0)-(Number(b.chapter_no)||0));
  const filterBar = growthFilterBar();
  const controls = `
    <div class="row between" style="flex-wrap:wrap;gap:10px;margin-bottom:12px">
      <div><h2 style="font-size:18px">Marks journey</h2><div class="muted small">Percentage across chapters</div></div>
      <div class="row" style="gap:8px">
        <div class="seg"><button class="${GR.mode==='class'?'on':''}" onclick="setGrowthMode('class')">Class trend</button><button class="${GR.mode==='ind'?'on':''}" onclick="setGrowthMode('ind')">Individual</button></div>
        <select style="width:auto;${GR.mode==='ind'?'':'display:none'}" onchange="setGrowthStudent(this.value)">${growthStudentOptions(classStudents)}</select>
      </div>
    </div>`;
  if(tests.length<2){
    show(`
      ${filterBar}
      <div class="card pad">
        ${controls}
        <div class="muted" style="margin-top:8px">Add one more chapter test for ${GR.subject} to see the trend.</div>
      </div>
    `);
    return;
  }
  const allRes = await DB.allResults();
  const labels = tests.map(t=>chapterLabel(t));
  const classSeries = [];
  for(const t of tests){ classSeries.push(await classAverage(t)); }
  const studentSeries = tests.map(t=>{
    const r = allRes.find(x=>x.test_id===t.id && x.student_id===GR.student);
    return (r&&!r.na&&r.present&&r.marks!=null)?pct(r.marks,t.full_marks):null;
  });
  const sName = (students.find(s=>s.id===GR.student)||{}).name||'';
  const series = GR.mode==='class'
    ? [{name:'Class average',data:classSeries,color:'#378ADD',w:3}]
    : [{name:sName,data:studentSeries,color:'var(--teal)',w:3},{name:'Class average',data:classSeries,color:'#888780',w:1.5,dash:true}];
  show(`
    ${filterBar}
    <div class="card pad">
      ${controls}
      ${lineChartSVG(labels, series)}
    </div>
  `);
}

function growthFilterBar(){
  return `
    <div class="card pad" style="margin-bottom:14px">
      <div class="wrap-fields">
        <div class="field"><label>Class</label><select onchange="setGrowthFilter('cls',this.value)">${classOptions(GR.cls)}</select></div>
        <div class="field"><label>Section</label><select onchange="setGrowthFilter('section',this.value)">${sectionOptions(GR.section,true)}</select></div>
        <div class="field"><label>Subject</label><select onchange="setGrowthFilter('subject',this.value)">${subjectOptions(GR.subject)}</select></div>
      </div>
    </div>`;
}

function growthStudentOptions(students){
  return students.length
    ? students.map(s=>`<option value="${s.id}" ${s.id===GR.student?'selected':''}>${s.name}</option>`).join('')
    : '<option value="">No students</option>';
}

window.setGrowthFilter = (key,value)=>{
  GR[key] = value;
  if(key==='cls') GR.student = null;
  growth();
};
window.setGrowthMode = m=>{ GR.mode=m; growth(); };
window.setGrowthStudent = id=>{ GR.student=id; growth(); };

function lineChartSVG(labels, series){
  const W=680,H=300,pad={l:38,r:14,t:16,b:34};
  const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
  const x=i=>pad.l + (labels.length<=1?iw/2:(i*iw/(labels.length-1)));
  const y=v=>pad.t + ih - (v/100*ih);
  let grid='';
  [0,25,50,75,100].forEach(g=>{ grid+=`<line x1="${pad.l}" y1="${y(g)}" x2="${W-pad.r}" y2="${y(g)}" stroke="#eef1ee"/><text x="${pad.l-8}" y="${y(g)+4}" font-size="11" fill="#8a978d" text-anchor="end">${g}%</text>`; });
  let xl=labels.map((l,i)=>`<text x="${x(i)}" y="${H-12}" font-size="11" fill="#8a978d" text-anchor="middle">${l}</text>`).join('');
  let paths='',dots='',legend='';
  series.forEach((s,si)=>{
    let d='',open=false;
    s.data.forEach((v,i)=>{
      if(v==null){ open=false; return; }
      const p=[x(i),y(v)];
      d+=(open?'L':'M')+p[0]+' '+p[1]+' ';
      open=true;
      dots+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${s.color}"/>`;
    });
    if(d) paths+=`<path d="${d.trim()}" fill="none" stroke="${s.color}" stroke-width="${s.w}" ${s.dash?'stroke-dasharray="6 4"':''} stroke-linecap="round" stroke-linejoin="round"/>`;
    legend+=`<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-right:16px"><span style="width:${s.dash?'14px':'10px'};height:${s.dash?'0':'10px'};${s.dash?'border-bottom:2px dashed '+s.color:'background:'+s.color+';border-radius:2px'}"></span>${s.name}</span>`;
  });
  return `<div style="margin-bottom:6px">${legend}</div><svg viewBox="0 0 ${W} ${H}" width="100%">${grid}${paths}${dots}${xl}</svg>`;
}

/* =============================================================
   AUTH (Supabase email/password). Demo mode skips login entirely.
   ============================================================= */
let AUTH_MODE = 'signin';
const loginOverlay = document.getElementById('loginOverlay');
const authErr = el => document.getElementById('authErr').textContent = el;

function renderAuthMode(){
  document.getElementById('loginTitle').textContent = AUTH_MODE==='signin' ? 'Sign in' : 'Create an account';
  document.getElementById('authSubmit').textContent = AUTH_MODE==='signin' ? 'Sign in' : 'Create account';
  document.getElementById('authToggle').textContent = AUTH_MODE==='signin' ? 'New centre? Create an account' : 'Have an account? Sign in';
  document.getElementById('authPass').setAttribute('autocomplete', AUTH_MODE==='signin'?'current-password':'new-password');
  authErr('');
}
document.getElementById('authToggle').onclick = e=>{ e.preventDefault(); AUTH_MODE = AUTH_MODE==='signin'?'signup':'signin'; renderAuthMode(); };

async function ensureCentre(){
  let { data } = await supa.from('centres').select('id,name,address,phone,band_config,owner_user_id').limit(1);
  if (data && data.length){
    CENTRE_ID = data[0].id;
    if(Array.isArray(data[0].band_config) && data[0].band_config.length) CONFIG.BANDS = data[0].band_config;
    return;
  }
  const { data:created, error } = await supa.from('centres')
    .insert({ name:CONFIG.CENTRE.name, address:CONFIG.CENTRE.address, phone:CONFIG.CENTRE.phone, band_config:CONFIG.BANDS })
    .select('id,name,address,phone,band_config,owner_user_id').single();
  if (error) throw error;
  CENTRE_ID = created.id;
}

async function afterLogin(){
  loginOverlay.classList.remove('show');
  document.getElementById('navSignout').style.display='';
  try { const {data:{user}} = await supa.auth.getUser(); CURRENT_USER_ID = user?.id || 'unknown-user'; } catch(e){}
  try { await ensureCentre(); } catch(e){ /* RLS/setup issue surfaces on first action */ }
  home();
}

document.getElementById('authSubmit').onclick = async ()=>{
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPass').value;
  if(!email || !password){ authErr('Enter email and password.'); return; }
  authErr('');
  const fn = AUTH_MODE==='signup'
    ? supa.auth.signUp({ email, password })
    : supa.auth.signInWithPassword({ email, password });
  const { data, error } = await fn;
  if(error){ authErr(error.message); return; }
  if(AUTH_MODE==='signup' && !data.session){
    authErr('Account created — check your email to confirm, then sign in.');
    AUTH_MODE='signin'; renderAuthMode();
    return;
  }
  await afterLogin();
};

document.getElementById('navSignout').onclick = async ()=>{
  if(supa){ await supa.auth.signOut(); }
  location.reload();
};

async function init(){
  if(!CONFIG.USE_SUPABASE){ home(); return; }          // demo mode: no login
  renderAuthMode();
  const { data:{ session } } = await supa.auth.getSession();
  if(session){ await afterLogin(); }
  else { loginOverlay.classList.add('show'); }
}

init();
</script>

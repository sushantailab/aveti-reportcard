<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aveti Learning — Chapter Test Reports</title>
<link rel="icon" href="assets/images/aveti-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Supabase client (used only when USE_SUPABASE = true below) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="assets/css/styles.css?v=20260611-2">
</head>
<body>

<script src="assets/js/config.js"></script>

<div class="topnav">
  <div class="wrap">
    <div class="brandbar">
      <img class="brandlogo" alt="Aveti Learning" src="assets/images/aveti-logo.png">
      <div class="crumb" id="crumb" style="margin-left:2px">Home</div>
    </div>
    <div class="row">
      <button class="ghost" id="navHome">Home</button>
      <button class="ghost" id="navRoster">Students</button>
      <button class="ghost" id="navSignout" style="display:none">Sign out</button>
    </div>
  </div>
</div>

<div class="wrap" id="app"></div>

<!-- Save confirmation modal -->
<div class="overlay" id="saveOverlay">
  <div class="modal">
    <div class="check">✓</div>
    <h2 style="font-size:19px;">Test saved</h2>
    <div class="muted small" id="saveSummary" style="margin:6px 0 14px"></div>
    <div class="row" style="gap:8px;margin-bottom:8px">
      <button class="primary" style="flex:1" id="saveToParents">Share parent cards</button>
    </div>
    <div class="row" style="gap:8px">
      <button style="flex:1" id="saveToTeacher">Teacher report</button>
      <button style="flex:1" id="saveToGrowth">Growth</button>
    </div>
    <div style="margin-top:12px"><a class="link small" id="saveDone" href="#">Done — back to home</a></div>
  </div>
</div>

<!-- Login (shown only in live Supabase mode) -->
<div class="overlay" id="loginOverlay">
  <div class="modal" style="text-align:left">
    <div class="brandbar" style="justify-content:center;margin-bottom:8px"><img class="brandlogo" style="height:24px" alt="Aveti Learning" src="assets/images/aveti-logo.png"></div>
    <h2 id="loginTitle" style="font-size:19px;text-align:center">Sign in</h2>
    <div class="muted small" style="text-align:center;margin-bottom:14px">Aveti Learning · teacher access</div>
    <label class="tiny muted">Email</label>
    <input id="authEmail" type="email" autocomplete="email" placeholder="you@centre.org" style="margin:4px 0 10px">
    <label class="tiny muted">Password</label>
    <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••" style="margin:4px 0 6px">
    <div id="authErr" class="tiny" style="color:var(--red);min-height:16px;margin-bottom:8px"></div>
    <button class="primary" id="authSubmit" style="width:100%">Sign in</button>
    <div class="small muted" style="text-align:center;margin-top:12px"><a href="#" class="link" id="authToggle">New centre? Create an account</a></div>
  </div>
</div>

<script src="assets/js/core/database.js"></script>
<script src="assets/js/core/shared.js?v=20260611-2"></script>
<script src="assets/js/features/home-students.js?v=20260611-2"></script>
<script src="assets/js/features/marks.js"></script>
<script src="assets/js/features/reports.js"></script>
<script src="assets/js/features/growth.js?v=20260611-2"></script>
<script src="assets/js/features/insights.js?v=20260611-2"></script>
<script src="assets/js/app.js?v=20260611-2"></script>
</body>
</html>
